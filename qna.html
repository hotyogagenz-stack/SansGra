    /* ChatGPT-like Layout */
    body {
        margin: 0;
        height: 100vh;
        height: 100dvh; /* handle mobile address bar */
        display: flex;
        flex-direction: column;
        overflow: hidden; /* prevent body scroll */
    }
    
    .chat-layout {
        display: flex;
        flex: 1;
        width: 100%;
        background-color: var(--bg-light);
        overflow: hidden; /* prevents layout from growing past screen */
    }

    /* Sidebar */
    .chat-sidebar {
        width: 260px;
        background-color: #202123;
        color: white;
        display: flex;
        flex-direction: column;
        transition: width 0.3s;
        flex-shrink: 0;
    }
    
    .sidebar-header {
        padding: 10px;
    }

    .new-chat-btn {
        width: 100%;
        padding: 12px;
        background-color: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        border-radius: 6px;
        text-align: left;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.2s;
    }

    .new-chat-btn:hover {
        background-color: rgba(255,255,255,0.1);
    }

    .history-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    .history-item {
        padding: 10px;
        margin-bottom: 5px;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.9em;
        color: #ececf1;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .history-item:hover {
        background-color: #2a2b32;
    }

    /* Main Chat Area */
    .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: #ffffff;
        position: relative;
    }

    body.dark .chat-main {
        background-color: #343541;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 120px; /* space for input area */
    }

    .message-row {
        padding: 24px 20%;
        display: flex;
        gap: 20px;
    }

    .message-row.user {
        background-color: transparent;
    }

    .message-row.ai {
        background-color: #f7f7f8;
    }

    body.dark .message-row.ai {
        background-color: #444654;
    }

    .avatar {
        width: 30px;
        height: 30px;
        border-radius: 4px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
    }

    .avatar.user { background-color: #10a37f; color: white; }
    .avatar.ai { background-color: #701c1c; color: white; }

    .message-content {
        flex: 1;
        line-height: 1.6;
        color: #374151;
        font-size: 16px;
    }

    body.dark .message-content {
        color: #d1d5db;
    }

    /* Input Area */
    .chat-input-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 24px 20%;
        background-image: linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff 50%);
        box-sizing: border-box;
    }

    body.dark .chat-input-container {
        background-image: linear-gradient(180deg, rgba(52,53,65,0) 0%, #343541 50%);
    }

    .chat-input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        background-color: #ffffff;
        border: 1px solid rgba(0,0,0,0.1);
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }

    body.dark .chat-input-wrapper {
        background-color: #40414f;
        border-color: rgba(255,255,255,0.1);
    }

    .chat-input {
        flex: 1;
        padding: 16px;
        padding-right: 50px;
        border: none;
        background: transparent;
        font-size: 16px;
        outline: none;
        color: #374151;
    }

    body.dark .chat-input { color: #ececf1; }

    .send-btn {
        position: absolute;
        right: 10px;
        bottom: 10px;
        background: transparent;
        border: none;
        color: #10a37f;
        font-size: 20px;
        cursor: pointer;
        padding: 5px;
    }

    .send-btn:hover { color: #0d8a6a; }
    
    @media (max-width: 768px) {
        .chat-sidebar { display: none; }
        .message-row { padding: 15px; }
        .chat-input-container { padding: 15px; }
    }

    // Normalize Hinglish/mixed query to standard form
    function normalizeQuery(query) {
        if (!query) return "";

        let normalized = query.toLowerCase().trim();

        // Replace common punctuation/spaces
        normalized = normalized.replace(/[।॥\.\?\!\,]/g, ' '); // Devanagari dandas and punctuation
        normalized = normalized.replace(/[?.!,]/g, ' ');
        normalized = normalized.replace(/\s+/g, ' ').trim();

        // Tokenize and map each word
        const tokens = normalized.split(' ');
        const mappedTokens = tokens.map(token => {
            // Check exact match in map
            if (hinglishMap[token]) {
                return hinglishMap[token];
            }
            // Check partial matches for compound words
            for (let [key, value] of Object.entries(hinglishMap)) {
                if (token.includes(key) || key.includes(token)) {
                    return value;
                }
            }
            return token;
        });

        // Rejoin - try both original order and Devanagari
        let result = mappedTokens.join(' ');
        return result;
    }

    // Calculate similarity score between two strings
    function similarityScore(str1, str2) {
        const s1 = str1.toLowerCase().trim();
        const s2 = str2.toLowerCase().trim();

        // Exact match
        if (s1 === s2) return 100;

        // Contains match
        if (s1.includes(s2) || s2.includes(s1)) return 80;

        // Word-level overlap
        const words1 = new Set(s1.split(/\s+/).filter(w => w.length > 1));
        const words2 = new Set(s2.split(/\s+/).filter(w => w.length > 1));
        if (words1.size === 0 || words2.size === 0) return 0;

        const common = new Set([...words1].filter(x => words2.has(x)));
        const score = (common.size / Math.max(words1.size, words2.size)) * 60;
        return score;
    }

    // Load the QA Data
    async function loadQA() {
      try {
        const res = await fetch('qa_data.json');
        qaData = await res.json();
      } catch (err) {
        console.error("Failed to load QA Data", err);
      }
    }

    function findAnswer(question) {
        if (!question || !question.trim()) {
            return "कृपया एक प्रश्न पूछें। Please ask a question.";
        }

        const normalizedQuery = normalizeQuery(question);
        let bestMatch = null;
        let bestScore = 0;

        for(let item of qaData) {
            // Compare with original question
            const score1 = similarityScore(question, item.q);
            // Compare with normalized query
            const score2 = similarityScore(normalizedQuery, item.q);
            // Also compare normalized query with normalized version of item
            const normalizedItemQ = normalizeQuery(item.q);
            const score3 = similarityScore(normalizedQuery, normalizedItemQ);

            const maxScore = Math.max(score1, score2, score3);

            if (maxScore > bestScore) {
                bestScore = maxScore;
                bestMatch = item;
            }
        }

        // Threshold: require at least 25% similarity or some word overlap
        if (bestScore >= 25 || bestScore > 0) {
            return bestMatch.a;
        }

        return "I'm sorry, I don't have an answer for that yet. Could you try asking something else about Sanskrit grammar or Panini?";
    }

    function appendMessage(sender, text) {
        const msgContainer = document.getElementById('chatMessages');
        const isUser = sender === 'user';
        
        const row = document.createElement('div');
        row.className = `message-row ${isUser ? 'user' : 'ai'}`;
        
        const avatar = document.createElement('div');
        avatar.className = `avatar ${isUser ? 'user' : 'ai'}`;
        avatar.innerHTML = isUser ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-robot"></i>';
        
        const content = document.createElement('div');
        content.className = 'message-content';
        content.innerText = text;
        
        row.appendChild(avatar);
        row.appendChild(content);
        msgContainer.appendChild(row);
        
        // Scroll to bottom
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function addToHistory(question) {
        const historyList = document.getElementById('historyList');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<i class="fa-regular fa-message"></i> ${question}`;
        
        // When clicking a history item, it puts the question back into the chat
        item.onclick = function() {
            document.getElementById('qnaInput').value = question;
        };
        
        // Prepend so latest is on top
        historyList.insertBefore(item, historyList.firstChild);
    }

    function askQuestion() {
        const input = document.getElementById('qnaInput');
        const text = input.value.trim();
        if(!text) return;
        
        // 1. Show User Message
        appendMessage('user', text);
        
        // 2. Add to History
        addToHistory(text);
        
        // 3. Clear Input
        input.value = '';
        
        // 4. Show AI answer...
        setTimeout(() => {
            const answer = findAnswer(text);
            appendMessage('ai', answer);
        }, 300);
    }

    function handleEnter(e) {
        if(e.key === 'Enter') {
            askQuestion();
        }
    }

    function startNewChat() {
        const msgContainer = document.getElementById('chatMessages');
        msgContainer.innerHTML = `
        <div class="message-row ai">
          <div class="avatar ai"><i class="fa-solid fa-robot"></i></div>
          <div class="message-content">Hello! I am your Sanskrit AI Assistant. Ask me anything about Panini, grammar rules, or translations.</div>
        </div>`;
    }

    window.addEventListener('load', loadQA);
  </script>
</body>
</html>

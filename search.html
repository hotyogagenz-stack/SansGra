<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अन्वेषणम् | Sanskrit Search Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .search-page-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            min-height: 70vh;
        }

        .search-hero {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .search-hero h1 {
            font-family: 'Tiro Devanagari Sanskrit', serif;
            color: #701c1c;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 10px;
            font-weight: 900;
        }

        .search-box-wrapper {
            position: relative;
            max-width: 700px;
            margin: 0 auto 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            background: #fff;
            padding: 2px;
            border: 1px solid #d1d5db;
            transition: all 0.3s ease;
        }

        .search-box-wrapper:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(112, 28, 28, 0.1);
            border-color: #701c1c;
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px;
            padding-right: 60px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            outline: none;
            background: transparent;
            color: #374151;
            font-family: 'Tiro Devanagari Sanskrit', serif;
        }

        .search-icon-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background: #701c1c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .search-icon-btn:hover {
            transform: translateY(-50%) scale(1.1);
            background: #ca8a04;
            color: #701c1c;
        }

        .search-filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 8px 20px;
            background: #fff;
            border: 1px solid #ca8a04;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #701c1c;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-tag:hover, .filter-tag.active {
            background: #701c1c;
            color: #fcd34d;
            border-color: #701c1c;
        }

        .results-container {
            margin-top: 30px;
        }

        .search-results {
            display: grid;
            gap: 20px;
        }

        .result-card {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: 0.3s;
            animation: fadeInUp 0.5s ease-out both;
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(112, 28, 28, 0.1);
            border-color: #fcd34d;
        }

        .ex-text {
            font-size: 1.6rem;
            color: #701c1c;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .su-text {
            font-size: 1rem;
            color: #b45309;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .desc-text {
            font-size: 1.1rem;
            color: #4b5563;
            line-height: 1.6;
        }

        .section-header {
            font-family: 'Tiro Devanagari Sanskrit', serif;
            font-size: 1.8rem;
            color: #701c1c;
            margin: 40px 0 20px;
            border-bottom: 2px solid #fcd34d;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-header span {
            font-size: 1.1rem;
            opacity: 0.6;
            font-family: 'Baloo 2', cursive;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body.dark .search-box-wrapper { background: #1e1e2f; border-color: #334155; }
        body.dark #searchInput { color: #f8fafc; }
        body.dark .result-card { background: #1e1e2f; border-color: #334155; }
        body.dark .desc-text { color: #cbd5e1; }
        body.dark .filter-tag { background: #1e1e2f; color: #fcd34d; border-color: #444; }

    </style>
</head>
<body class="search-page">
    <div id="floating-sanskrit-container"></div>
    <div id="site-header"></div>

    <main class="search-page-container">
        <section class="search-hero">
            <h1 data-i18n="search_title">॥ अन्वेषणम् ॥</h1>
            <p style="color: #581818; opacity: 0.8; font-weight: 600;" data-i18n="search_placeholder">धातु, प्रत्यय या सूत्र संख्या से खोजें</p>
        </section>

        <div class="search-box-wrapper">
            <input type="text" id="searchInput" class="sanskrit-text" 
                data-i18n-placeholder="search_input_placeholder" 
                placeholder="अत्र लिखन्तु..." 
                onkeyup="performSearch()"
                autocomplete="off" autofocus>
            <button class="search-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="search-filters">
            <span class="filter-tag active" onclick="filterResults('all')">All</span>
            <span class="filter-tag" onclick="filterResults('examples')">Examples</span>
            <span class="filter-tag" onclick="filterResults('sutras')">Sutras</span>
            <span class="filter-tag" onclick="filterResults('dhatus')">Dhatus</span>
            <span class="filter-tag" onclick="filterResults('pratyayas')">Pratyayas</span>
        </div>

        <div id="searchResults" class="search-results">
            <!-- Results will be injected here -->
             <div style="text-align: center; padding: 50px; opacity: 0.5;">
                <i class="fa-solid fa-feather-pointed" style="font-size: 3rem; margin-bottom: 20px; color: #701c1c;"></i>
                <p style="font-size: 1.2rem; font-weight: 600;">प्रतीक्षा कुर्वन्तु... अन्वेषणार्थं किमपि लिखन्तु।</p>
             </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="ashtadhyayi_engine.js"></script>
    <script src="animations.js"></script>
    <script src="script.js"></script>
    <script>
        // Additional logic for search page
        function filterResults(type) {
            document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
            event.target.classList.add('active');
            // This would normally filter the UI, but our performSearch currently re-renders everything.
            // For now, let's just trigger search again.
            performSearch();
        }

        // Focus search input on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('searchInput').focus();
            }, 500);
        });
    </script>
</body>
</html>

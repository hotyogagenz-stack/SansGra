<!doctype html>
<html lang="sa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shabda Rupa</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script defer src="animations.js"></script>
  <script defer src="script.js"></script>
</head>
  <body>
    <div id="site-header"></div>
    <div id="floating-sanskrit-container"></div>
    <main class="container full-width" style="position: relative; z-index: 10;">
    <section class="sutras-page">
      <div class="sutra-hero-row" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <button class="menu-mini-btn" aria-hidden="true" onclick="toggleMiniMenu(event)" style="background:none;border:none;font-size:20px;">☰</button>
        <h1 style="margin:0;">शब्दरूपाणि (Shabda Rupa)</h1>
      </div>
      <p>शब्दानां लिङ्ग-अन्त-अनुसारं वर्गीकरणम्</p>
      <div id="shabdaList" class="sutra-list">
      </div>
      <!-- Declension pills and generated table area -->
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;" id="declensionPills">
        <button class="pill" onclick="renderDeclensionFor('अकारान्त')">अकारान्त</button>
        <button class="pill" onclick="renderDeclensionFor('इकारान्त')">इकारान्त</button>
        <button class="pill" onclick="renderDeclensionFor('उकारान्त')">उकारान्त</button>
      </div>
      <div id="declensionArea" style="margin-top:12px"></div>
      <div id="prakriyaBox" style="display:none;margin-top:12px;">
        <h4>प्रक्रिया</h4>
        <div id="finalOutput" style="font-size:1.2rem;font-weight:700;margin-bottom:8px"></div>
        <ol id="prakriyaSteps"></ol>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script>
    const shabdas = [
      "अकारान्त पुल्लिंग", "अकारान्त स्त्रीलिंग", "अकारान्त नपुंसकलिंग",
      "आकारान्त पुल्लिंग", "आकारान्त स्त्रीलिंग", "आकारान्त नपुंसकलिंग",
      "इकारान्त पुल्लिंग", "इकारान्त स्त्रीलिंग", "इकारान्त नपुंसकलिंग",
      "ईकारान्त पुल्लिंग", "ईकारान्त स्त्रीलिंग", "ईकारान्त नपुंसकलिंग",
      "उकारान्त पुल्लिंग", "उकारान्त स्त्रीलिंग", "उकारान्त नपुंसकलिंग",
      "ऊकारान्त पुल्लिंग", "ऊकारान्त स्त्रीलिंग", "ऊकारान्त नपुंसकलिंग",
      "ऋकारान्त पुल्लिंग", "ऋकारान्त स्त्रीलिंग", "ऋकारान्त नपुंसकलिंग",
      "व्यंजनान्त पुल्लिंग", "व्यंजनान्त स्त्रीलिंग", "व्यंजनान्त नपुंसकलिंग"
    ];

    async function renderShabdas() {
      const container = document.getElementById('shabdaList');
      if (!container) return;
      container.innerHTML = '';
      
      let shabdaData = {};
      try {
        const res = await fetch('shabda_rupa.json');
        shabdaData = await res.json();
      } catch(e) {
        console.error("Could not load shabda_rupa.json", e);
      }
      
      shabdas.forEach(shabda => {
        const item = document.createElement('div');
        item.className = 'sutra-item sutra-card';
        const header = document.createElement('div'); header.className = 'sutra-card-header sanskrit-text'; header.innerHTML = `<span>${shabda}</span>`;
        const desc = document.createElement('div'); desc.className = 'sutra-card-desc'; 
        
        if (shabdaData[shabda] && shabdaData[shabda].length > 0) {
            let html = '<table style="width:100%;border-collapse:collapse;margin-top:10px;text-align:left;">';
            html += '<thead style="background:var(--card-bg);"><tr><th style="padding:8px;border-bottom:2px solid var(--border-light);">विभक्ति</th><th style="padding:8px;border-bottom:2px solid var(--border-light);">एकवचनम्</th><th style="padding:8px;border-bottom:2px solid var(--border-light);">द्विवचनम्</th><th style="padding:8px;border-bottom:2px solid var(--border-light);">बहुवचनम्</th></tr></thead>';
            html += '<tbody>';
            shabdaData[shabda].forEach(r => {
                html += `<tr><td style="padding:8px;border-bottom:1px solid var(--border-light);font-weight:600;">${r.vibhakti}</td><td style="padding:8px;border-bottom:1px solid var(--border-light);">${r.ekavachanam}</td><td style="padding:8px;border-bottom:1px solid var(--border-light);">${r.dvivachanam}</td><td style="padding:8px;border-bottom:1px solid var(--border-light);">${r.bahuvachanam}</td></tr>`;
            });
            html += '</tbody></table>';
            desc.innerHTML = html;
        } else {
            desc.innerHTML = '<p style="margin:0;color:#c7c7c7;">रूपाणि शीघ्रमेव योजयिष्यन्ते।</p>';
        }
        
        item.appendChild(header); item.appendChild(desc); container.appendChild(item);
      });

      container.querySelectorAll('.sutra-item').forEach(item => {
        const hdr = item.querySelector('.sutra-card-header'); if(!hdr) return;
        hdr.setAttribute('tabindex','0'); hdr.setAttribute('role','button'); hdr.setAttribute('aria-expanded','false');
        hdr.addEventListener('click', (ev) => { ev.stopPropagation(); container.querySelectorAll('.sutra-item.active').forEach(act=>{ if(act!==item){ act.classList.remove('active'); act.querySelector('.sutra-card-header')?.setAttribute('aria-expanded','false'); } }); const becoming = item.classList.toggle('active'); hdr.setAttribute('aria-expanded', becoming ? 'true' : 'false'); });
      });
    }

    window.addEventListener('load', renderShabdas);
  </script>
</body>
</html>

<!-- Shared header fragment: mini-header + main header/nav -->
<!-- mini header -->
<div class="mini-header">
    <a id="miniBrand" class="mini-brand sanskrit-text" data-i18n="brand" href="index.html" onclick="closeMobileMenu()">संस्कृत</a>
    <div class="mini-controls">
        <button class="mini-toggle" onclick="toggleDark()"><i class="fa-solid fa-moon" id="theme-icon-mini"></i></button>
        <div class="lang-switch">
            <button id="langHi" class="lang-btn" onclick="setLang('hi')" data-lang="hi">हिन्दी</button>
            <button id="langEn" class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
            <button id="langSa" class="lang-btn" onclick="setLang('sa')" data-lang="sa">सं</button>
        </div>
        <div class="mini-menu">
            <button id="miniMenuBtn" class="menu-btn" aria-expanded="false" aria-controls="miniMenuDropdown" onclick="toggleMiniMenu(event)">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div id="miniMenuDropdown" class="mini-menu-dropdown" role="menu" aria-hidden="true">
                <a id="miniHome" href="index.html" class="mini-menu-item" data-i18n="home" onclick="closeMobileMenu()">होम</a>
                <a id="miniSearch" href="#" class="mini-menu-item" data-i18n="search_examples" onclick="openSearchModal(); closeMobileMenu()">उदाहरण खोजें</a>
                <a id="miniBuilder" href="builder.html" class="mini-menu-item" data-i18n="builder" onclick="closeMobileMenu()">Builder</a>
                <a id="miniSutra" href="sutras.html" class="mini-menu-item" data-i18n="sutra" onclick="closeMobileMenu()">व्याकरण सूत्र</a>
                <a id="miniDark" href="#" class="mini-menu-item" data-i18n="dark_mode" onclick="toggleDark(); closeMobileMenu()">Dark Mode</a>
            </div>
        </div>
    </div>
</div>

<!-- main header/navigation removed per request; only mini-header (brown) remains -->

<!-- Search modal included in shared header so it is available on all pages -->
<div id="searchModal" class="modal" aria-hidden="true">
    <div class="modal-content">
        <button class="close-btn" aria-label="Close search" onclick="closeSearchModal()">&times;</button>
        <h2 style="color: var(--text-dark); margin-bottom: 5px;">
            <i class="fa-solid fa-magnifying-glass" style="color:#b45309;"></i> <span data-i18n="search_title">उदाहरण खोजें</span>
        </h2>
        <p style="margin-bottom: 20px; font-size: 0.9em; color: var(--text-light);" data-i18n="search_placeholder">
            धातु, प्रत्यय या सूत्र संख्या से खोजें (उदा: 1.1.1)
        </p>
        <input type="text" id="searchInput" class="sanskrit-text" placeholder="खोजें..." onkeyup="performSearch()" autocomplete="off">
        <div id="searchResults" class="search-results"></div>
    </div>
</div>

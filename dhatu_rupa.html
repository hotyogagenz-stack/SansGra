<!doctype html>
<html lang="sa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dhatu Rupa</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script defer src="animations.js"></script>
  <script defer src="script.js"></script>
</head>
  <body>
    <div id="site-header"></div>
    <div id="floating-sanskrit-container"></div>
    <main class="container full-width" style="position: relative; z-index: 10;">
    <section class="sutras-page">
      <div class="sutra-hero-row" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <button class="menu-mini-btn" aria-hidden="true" onclick="toggleMiniMenu(event)" style="background:none;border:none;font-size:20px;">☰</button>
        <h1 style="margin:0;">धातुरूपाणि (Dhatu Rupa)</h1>
      </div>
      <p>लकारानुसारं धातुरूपाणि पश्यन्तु</p>
      <div id="lakaraList" class="sutra-list">
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script>
    const lakaras = [
      "लट् लकार (वर्तमान काल)",
      "लङ् लकार (भूतकाल – अनद्यतन)",
      "लिट् लकार (परोक्ष भूतकाल)",
      "लुट् लकार (अनद्यतन भविष्यत्)",
      "लृट् लकार (साधारण भविष्यत्)",
      "लोट् लकार (आज्ञार्थक)",
      "विधिलिङ् लकार (संभावना/इच्छा)",
      "आशीर्लिङ् लकार (आशीर्वाद)",
      "लुङ् लकार (आगम भूतकाल)",
      "लृङ् लकार (शर्त/संभाव्य भूत)"
    ];

    function renderLakaras() {
      const container = document.getElementById('lakaraList');
      if (!container) return;
      container.innerHTML = '';
      
    lakaras.forEach((lakara, index) => {
    const item = document.createElement('div');
    item.className = 'sutra-item sutra-card';
    const header = document.createElement('div'); header.className = 'sutra-card-header sanskrit-text'; header.textContent = lakara;
    const desc = document.createElement('div'); desc.className = 'sutra-card-desc';
    desc.innerHTML = `
      <div style="padding: 15px;">
        <p style="margin-bottom: 10px;">धातुं प्रविशन्तु:</p>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
          <input type="text" id="dhatuInput_${index}" class="hero-search-bar sanskrit-text" placeholder="उदा. पठ्, गम्, लिख्" style="flex:1;">
          <button class="hero-search-btn" style="position: static; transform: none;" onclick="showDhatuRupa(${index}, '${lakara}')">
            <i class="fa-solid fa-bolt"></i>
          </button>
        </div>
        <div id="dhatuResult_${index}" class="sanskrit-text" style="display:none; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 8px;">
          <!-- Result will be shown here -->
        </div>
      </div>
    `;
    item.appendChild(header); item.appendChild(desc); container.appendChild(item);
    });

    container.querySelectorAll('.sutra-item').forEach(item => {
    const hdr = item.querySelector('.sutra-card-header'); if(!hdr) return;
    hdr.setAttribute('tabindex','0'); hdr.setAttribute('role','button'); hdr.setAttribute('aria-expanded','false');
    hdr.addEventListener('click', (ev) => { ev.stopPropagation(); container.querySelectorAll('.sutra-item.active').forEach(act=>{ if(act!==item){ act.classList.remove('active'); act.querySelector('.sutra-card-header')?.setAttribute('aria-expanded','false'); } }); const becoming = item.classList.toggle('active'); hdr.setAttribute('aria-expanded', becoming ? 'true' : 'false'); });
    });
    }

    function showDhatuRupa(index, lakara) {
        const input = document.getElementById(`dhatuInput_${index}`).value;
        const resultDiv = document.getElementById(`dhatuResult_${index}`);
        if(!input) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p style="color: red;">कृपया धातुं लिखन्तु!</p>';
            return;
        }
        
        resultDiv.style.display = 'block';
        // A placeholder for actual dhatu rupa generation logic
        resultDiv.innerHTML = `
            <h3 style="margin-bottom:10px; color: #701c1c;">${input} - ${lakara.split(' ')[0]}</h3>
            <table style="width:100%; border-collapse: collapse; text-align:center;">
                <tr style="background: rgba(180, 83, 9, 0.1);">
                    <th style="padding: 8px; border: 1px solid #d1d5db;">पुरुषः</th>
                    <th style="padding: 8px; border: 1px solid #d1d5db;">एकवचनम्</th>
                    <th style="padding: 8px; border: 1px solid #d1d5db;">द्विवचनम्</th>
                    <th style="padding: 8px; border: 1px solid #d1d5db;">बहुवचनम्</th>
                </tr>
                <tr>
                    <td style="padding: 8px; border: 1px solid #d1d5db; font-weight: bold;">प्रथमः</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}ति</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}तः</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}न्ति</td>
                </tr>
                <tr>
                    <td style="padding: 8px; border: 1px solid #d1d5db; font-weight: bold;">मध्यमः</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}सि</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}थः</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}थ</td>
                </tr>
                <tr>
                    <td style="padding: 8px; border: 1px solid #d1d5db; font-weight: bold;">उत्तमः</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}मि</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}वः</td>
                    <td style="padding: 8px; border: 1px solid #d1d5db;">${input}मः</td>
                </tr>
            </table>
            <p style="margin-top:10px; font-size:0.9em; color:#666;">(Note: This is a simplified display for demonstration)</p>
        `;
    }

    window.addEventListener('load', renderLakaras);
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      function attach() {
        document.querySelectorAll('input[id^="dhatuInput_"]').forEach(inp=>{
          if (inp.__dd) return; const ddId = 'dd-' + inp.id; let dd = document.getElementById(ddId); if(!dd){ dd = document.createElement('ul'); dd.id = ddId; dd.className = 'dropdown'; inp.parentElement.appendChild(dd); }
          function render(items){ dd.innerHTML = items.length? items.map(it=>`<li class="dropdown-item">${it.label||it.key||it.ex||''}</li>`).join('') : '<li class="no-results">कोई परिणाम नहीं मिला</li>'; dd.classList.add('open'); dd.querySelectorAll('.dropdown-item').forEach(li=>li.addEventListener('mousedown',(ev)=>{ ev.preventDefault(); inp.value = li.textContent; inp.focus(); dd.classList.remove('open'); })); }
      inp.addEventListener('focus', ()=>{ const items = (sanskritDatabase && sanskritDatabase.dhatus)? Object.entries(sanskritDatabase.dhatus).slice(0,12).map(([k,v])=>({key:k,label:v.label||k})):[]; if(items.length) render(items); else fetch('examples.json').then(r=>r.json()).then(j=>{
        const items = (j && j.examples)? j.examples.slice(0,10):[]; let parts=[]; items.forEach(it=>{ const ex=it.ex||''; ex.split(/[,;]+/).map(s=>s.trim()).filter(Boolean).forEach(p=>parts.push(p)); }); render(parts.map(p=>({label:p})).slice(0,12));
      }).catch(()=>{}); });
          inp.addEventListener('input', ()=>{ const q=inp.value.trim().toLowerCase(); const items=(sanskritDatabase && sanskritDatabase.dhatus)? Object.entries(sanskritDatabase.dhatus).map(([k,v])=>({key:k,label:v.label||k})):[]; const filtered = q? items.filter(it=> (it.key+' '+it.label).toLowerCase().includes(q)): items.slice(0,12); render(filtered.slice(0,12)); });
          inp.addEventListener('blur', ()=> setTimeout(()=>dd.classList.remove('open'),150));
          inp.__dd = true;
        });
      }
      setTimeout(attach, 300);
      const mo = new MutationObserver(attach); mo.observe(document.getElementById('lakaraList'), { childList:true, subtree:true });
    });
  </script>
  <script>
    // Attach suggestion dropdowns to dynamically created dhatu input fields inside lakara cards
    document.addEventListener('DOMContentLoaded', function() {
      const attach = () => {
        document.querySelectorAll('input[id^="dhatuInput_"]').forEach(inp => {
          if (inp.__suggestionsWired) return;
          const type = detectInputTypeFromId(inp.id) || 'dhatu';
          const dd = ensureSuggestionDropdownForInput(inp, type);
          function showSuggestionsWhenReady(input, type, dd) {
            const tryShow = () => {
                if (typeof sanskritDatabase !== 'undefined' && sanskritDatabase) { handleInput(input, type, dd); return; }
                const deadline = Date.now() + 3000;
                const poll = setInterval(() => {
                    if (typeof sanskritDatabase !== 'undefined' && sanskritDatabase) { clearInterval(poll); handleInput(input, type, dd); }
          else if (Date.now() > deadline) { clearInterval(poll); fetch('examples.json').then(r=>r.json()).then(j=>{
            const items = (j && j.examples)? j.examples.slice(0,8):[]; let parts=[]; items.forEach(it=>{ const ex=it.ex||''; ex.split(/[,;]+/).map(s=>s.trim()).filter(Boolean).forEach(p=>parts.push(p)); });
            const html = parts.map(p=>`<div class="suggestion-item" data-val="${p.replace(/"/g,'\"')}">${p}</div>`).join('');
            if (dd) { dd.innerHTML = html || '<div class="no-suggestions">कोई परिणाम नहीं मिला</div>'; dd.classList.add('show'); dd.querySelectorAll('.suggestion-item').forEach(el=>el.addEventListener('mousedown', ev=>{ ev.preventDefault(); const v=el.getAttribute('data-val'); document.getElementById(input.id).value = v; closeAllSuggestions(); })); }
          }).catch(()=>{ if (dd) { dd.innerHTML = '<div class="no-suggestions">डेटाबेस लोड हो रहा है...</div>'; dd.classList.add('show'); } }); }
                }, 140);
            };
            tryShow();
          }
          inp.addEventListener('focus', () => showSuggestionsWhenReady(inp, type, dd));
          inp.addEventListener('click', () => showSuggestionsWhenReady(inp, type, dd));
          inp.__suggestionsWired = true;
        });
      };
      // run after render
      setTimeout(attach, 300);
      const mo = new MutationObserver(attach);
      mo.observe(document.getElementById('lakaraList'), { childList: true, subtree: true });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskrit Magic Builder | Ashtadhyayi Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--border-light); font-size: clamp(16px, 3vw, 20px); font-weight: 600; outline: none; transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        input[type="text"]:focus { border-color: #9a3412; box-shadow: 0 0 8px rgba(154, 52, 18, 0.2); }
        .sutra-desc p { margin-bottom: 8px; line-height: 1.6; }
    /* ensure equal spacing and column sizing for input grids */
    .input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; align-items: stretch; justify-items: stretch; }
    .input-grid > div { min-width: 0; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<!-- shared header placeholder (loaded dynamically) -->
<div id="site-header"></div>

<div id="floating-sanskrit-container"></div>

<section class="hero" style="position: relative; z-index: 10; margin-top: 10px; margin-bottom: 20px;">
    <div class="ancient-hero" style="background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 30px 40px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 15px rgba(69, 26, 3, 0.1); border: 1px solid rgba(154, 52, 18, 0.2); border-top: 4px solid #78350f;">
        <h1 data-i18n="hero_title" style="color: #4a2f1d; text-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 10px; font-weight: 800; font-size: clamp(2rem, 5vw, 3rem); font-family: 'Tiro Devanagari Sanskrit', serif;">तिङन्त प्रक्रिया</h1>
        <p data-i18n="hero_subtitle" style="color: #78350f; font-size: clamp(1.1rem, 2.5vw, 1.3rem); font-weight: 600;">अष्टाध्यायी के नियमों (१.१.१ - १.१.७५) के साथ शुद्ध रूप सिद्धि।</p>
    </div>
</section>

<div class="main-container" id="tool" style="position: relative; z-index: 10;">
    <div class="card premium-card">
        <div style="max-width:900px;margin:0 auto;">
            <div style="background:var(--card-light);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow);border:1px solid var(--border-light);">
                <div class="input-grid">
                    <div>
                        <label class="sanskrit-text" style="display:block;font-weight:800;color:#7a3410;margin-bottom:8px;">उपसर्ग</label>
                        <input type="text" id="tinnanta_upa" class="sanskrit-text pill-input" placeholder="उपसर्ग (यदि)" aria-label="उपसर्ग">
                    </div>
                    <div>
                        <label class="sanskrit-text" style="display:block;font-weight:800;color:#7a3410;margin-bottom:8px;">धातु (मूल)</label>
                        <input type="text" id="tinnanta_dhatu" class="sanskrit-text pill-input" placeholder="धातु (उदा. पठ्)" aria-label="धातु">
                    </div>
                    <div>
                        <label class="sanskrit-text" style="display:block;font-weight:800;color:#7a3410;margin-bottom:8px;">लकार</label>
                        <input type="text" id="tinnanta_lakar" class="sanskrit-text pill-input" placeholder="लकार (उदा. लट्, लङ्)" aria-label="लकार">
                    </div>
                    <div>
                        <label class="sanskrit-text" style="display:block;font-weight:800;color:#7a3410;margin-bottom:8px;">प्रत्यय</label>
                        <input type="text" id="tinnanta_pratyaya" class="sanskrit-text pill-input" placeholder="प्रत्यय (उदा. त्)" aria-label="प्रत्यय">
                    </div>
                </div>

                <div style="margin-top:20px;display:flex;justify-content:center;">
                    <button id="tinnantaMakeBtn" class="btn-generate maroon-full" onclick="makeTinnanta()" style="width:78%;padding:20px 30px;border-radius:14px;font-size:1.05rem;">शब्द बनाओ</button>
                </div>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-box" onclick="togglePrakriya()">
                <div class="result-text sanskrit-text" id="finalOutput"></div>
                <div class="hint"><i class="fa-solid fa-hand-pointer"></i> <span data-i18n="result_hint">यह कैसे बना? (प्रक्रिया देखने के लिए टैप करें)</span></div>
            </div>

            <div class="prakriya-box" id="prakriyaBox">
                <div class="prakriya-title"><i class="fa-solid fa-list-check"></i> <span data-i18n="prakriya_title">पाणिनीय सिद्धि प्रक्रिया:</span></div>
                <ul class="step-list sanskrit-text" id="prakriyaSteps">
                    </ul>
            </div>
        </div>
    </div>
</div>

<div id="searchModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeSearchModal()">&times;</span>
        <h2 style="color: var(--text-dark); margin-bottom: 5px;">
            <i class="fa-solid fa-magnifying-glass" style="color:#ec4899;"></i> <span data-i18n="search_title">उदाहरण खोजें</span>
        </h2>
        <p style="margin-bottom: 20px; font-size: 0.9em; color: var(--text-light);" data-i18n="search_placeholder">
            धातु, प्रत्यय या सूत्र संख्या से खोजें (उदा: 1.1.1)
        </p>
        
        <input type="text" id="searchInput" class="sanskrit-text" placeholder="खोजें..." onkeyup="performSearch()" autocomplete="off">
        
        <div id="searchResults" class="search-results">
            </div>
    </div>
</div>

<!-- shared footer placeholder (loaded dynamically) -->
<div id="site-footer"></div>

<script src="ashtadhyayi_engine.js"></script>
<script src="animations.js"></script>
<script src="script.js"></script>

</body>
</html>

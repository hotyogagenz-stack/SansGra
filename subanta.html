<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskrit Magic Builder | Ashtadhyayi Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--border-light); font-size: clamp(16px, 3vw, 20px); font-weight: 600; outline: none; transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        input[type="text"]:focus { border-color: #9a3412; box-shadow: 0 0 8px rgba(154, 52, 18, 0.2); }
        .sutra-desc p { margin-bottom: 8px; line-height: 1.6; }
    </style>
</head>
<body>

<!-- shared header placeholder (loaded dynamically) -->
<div id="site-header"></div>

<div id="floating-sanskrit-container"></div>

<section class="hero" style="position: relative; z-index: 10; margin-top: 10px; margin-bottom: 20px;">
    <div class="ancient-hero" style="background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 30px 40px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 15px rgba(69, 26, 3, 0.1); border: 1px solid rgba(154, 52, 18, 0.2); border-top: 4px solid #78350f;">
        <h1 data-i18n="hero_title" style="color: #4a2f1d; text-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 10px; font-weight: 800; font-size: clamp(2rem, 5vw, 3rem); font-family: 'Tiro Devanagari Sanskrit', serif;">सुबन्त प्रक्रिया</h1>
        <p data-i18n="hero_subtitle" style="color: #78350f; font-size: clamp(1.1rem, 2.5vw, 1.3rem); font-weight: 600;">अष्टाध्यायी के नियमों (१.१.१ - १.१.७५) के साथ शुद्ध रूप सिद्धि।</p>
    </div>
</section>

<div class="main-container" id="tool" style="position: relative; z-index: 10;">
    <div class="card premium-card">
        <div style="max-width:760px;margin:0 auto;">
            <div class="pill-input-row" style="display:flex;gap:12px;align-items:center;justify-content:center;">
                                <div class="field-wrap">
                                    <input type="text" id="subanta_upa" class="sanskrit-text pill-input" placeholder="उपसर्ग (उदा. सु, निग...)" aria-label="उपसर्ग">
                                    <ul class="dropdown" id="dd-subanta_upa"></ul>
                                </div>
                                <div class="field-wrap">
                                    <input type="text" id="subanta_pratipadika" class="sanskrit-text pill-input" placeholder="प्रातिपादिक (उदा. राम...)" aria-label="प्रातिपादिक">
                                    <ul class="dropdown" id="dd-subanta_pratipadika"></ul>
                                </div>
                                <div class="field-wrap">
                                    <input type="text" id="subanta_pratyaya" class="sanskrit-text pill-input" placeholder="प्रत्यय (उदा. नि, अण्...)" aria-label="प्रत्यय">
                                    <ul class="dropdown" id="dd-subanta_pratyaya"></ul>
                                </div>
            </div>

            <div style="margin-top:14px;">
                <button id="subantaMakeBtn" class="btn-generate maroon-full" onclick="makeSubanta()">शब्द बनाओ</button>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-box" onclick="togglePrakriya()">
                <div class="result-text sanskrit-text" id="finalOutput"></div>
                <div class="hint"><i class="fa-solid fa-hand-pointer"></i> <span data-i18n="result_hint">यह कैसे बना? (प्रक्रिया देखने के लिए टैप करें)</span></div>
            </div>

            <div class="prakriya-box" id="prakriyaBox">
                <div class="prakriya-title"><i class="fa-solid fa-list-check"></i> <span data-i18n="prakriya_title">पाणिनीय सिद्धि प्रक्रिया:</span></div>
                <ul class="step-list sanskrit-text" id="prakriyaSteps">
                    </ul>
            </div>
        </div>
    </div>
</div>

<div id="searchModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeSearchModal()">&times;</span>
        <h2 style="color: var(--text-dark); margin-bottom: 5px;">
            <i class="fa-solid fa-magnifying-glass" style="color:#ec4899;"></i> <span data-i18n="search_title">उदाहरण खोजें</span>
        </h2>
        <p style="margin-bottom: 20px; font-size: 0.9em; color: var(--text-light);" data-i18n="search_placeholder">
            धातु, प्रत्यय या सूत्र संख्या से खोजें (उदा: 1.1.1)
        </p>
        
        <input type="text" id="searchInput" class="sanskrit-text" placeholder="खोजें..." onkeyup="performSearch()" autocomplete="off">
        
        <div id="searchResults" class="search-results">
            </div>
    </div>
</div>

<!-- shared footer placeholder (loaded dynamically) -->
<div id="site-footer"></div>

<script src="ashtadhyayi_engine.js"></script>
<script src="animations.js"></script>
<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
    ['subanta_upa','subanta_pratipadika','subanta_pratyaya'].forEach(id=>{
        const inp = document.getElementById(id); if(!inp) return; const dd = document.getElementById('dd-'+id); if(!dd) return;
    function render(items){ dd.innerHTML = items.length? items.map(it=>`<li class="dropdown-item">${it.label||it.id||it.key||it.ex||''}</li>`).join('') : '<li class="no-results">कोई परिणाम नहीं मिला</li>'; dd.classList.add('open'); dd.querySelectorAll('.dropdown-item').forEach(li=>li.addEventListener('mousedown',(ev)=>{ ev.preventDefault(); inp.value = li.textContent; inp.focus(); dd.classList.remove('open'); })); }
        inp.addEventListener('focus', ()=>{ fetch('examples.json').then(r=>r.json()).then(j=>{
            const items=(j.examples||[]).slice(0,12);
            let parts = [];
            items.forEach(it=>{ const ex = it.ex||''; ex.split(/[,;]+/).map(s=>s.trim()).filter(Boolean).forEach(p=>parts.push(p)); });
            render(parts.map(p=>({ex:p})).slice(0,12));
        }).catch(()=>{}); });
        inp.addEventListener('input', ()=>{ const q=inp.value.trim().toLowerCase(); fetch('examples.json').then(r=>r.json()).then(j=>{ const items=(j.examples||[]); let parts=[]; items.forEach(it=>{ const ex=it.ex||''; ex.split(/[,;]+/).map(s=>s.trim()).filter(Boolean).forEach(p=>parts.push({ex:p})); }); const filtered = q? parts.filter(it=> (it.ex||'').toLowerCase().includes(q)): parts; render(filtered.slice(0,12)); }).catch(()=>{}); });
        inp.addEventListener('blur', ()=> setTimeout(()=>dd.classList.remove('open'),150));
    });
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    function showSuggestionsWhenReady(input, type, dd) {
        const tryShow = () => {
            if (typeof sanskritDatabase !== 'undefined' && sanskritDatabase) { handleInput(input, type, dd); return; }
            const deadline = Date.now() + 3000;
            const poll = setInterval(() => {
                if (typeof sanskritDatabase !== 'undefined' && sanskritDatabase) { clearInterval(poll); handleInput(input, type, dd); }
                else if (Date.now() > deadline) { clearInterval(poll); fetch('examples.json').then(r=>r.json()).then(j=>{
                    const items = (j && j.examples)? j.examples.slice(0,8):[];
                    let parts=[]; items.forEach(it=>{ const ex=it.ex||''; ex.split(/[,;]+/).map(s=>s.trim()).filter(Boolean).forEach(p=>parts.push(p)); });
                    const html = parts.map(p=>`<div class="suggestion-item" data-val="${p.replace(/"/g,'\"')}">${p}</div>`).join('');
                    if (dd) { dd.innerHTML = html || '<div class="no-suggestions">कोई परिणाम नहीं मिला</div>'; dd.classList.add('show'); dd.querySelectorAll('.suggestion-item').forEach(el=>el.addEventListener('mousedown', ev=>{ ev.preventDefault(); const v = el.getAttribute('data-val'); document.getElementById(input.id).value = v; closeAllSuggestions(); })); }
                }).catch(()=>{ if (dd) { dd.innerHTML = '<div class="no-suggestions">डेटाबेस लोड हो रहा है...</div>'; dd.classList.add('show'); } }); }
            }, 140);
        };
        tryShow();
    }

    ['subanta_upa','subanta_pratipadika','subanta_pratyaya'].forEach(id => {
        const input = document.getElementById(id);
        if (!input) return;
        const type = detectInputTypeFromId(input.id) || null;
        const dd = ensureSuggestionDropdownForInput(input, type);
        input.addEventListener('focus', () => showSuggestionsWhenReady(input, type, dd));
        input.addEventListener('click', () => showSuggestionsWhenReady(input, type, dd));
    });
});
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="sutras_title">Sutras</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="animations.js"></script>
  <script defer src="script.js"></script>
</head>
  <body>
    <div id="site-header"></div>
    <div id="floating-sanskrit-container"></div>
    <main class="container full-width" style="position: relative; z-index: 10;">
    <section class="sutras-page">
  <div class="sutra-hero-row" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
    <button class="menu-mini-btn" aria-hidden="true" onclick="toggleMiniMenu(event)" style="background:none;border:none;font-size:20px;">☰</button>
    <h1 data-i18n="sutras_heading" style="margin:0;">Sutras</h1>
  </div>
  <p data-i18n="sutras_intro">Select a sutra group to view the sutras. This page loads sutras from the site's data and is translated based on the header language buttons.</p>


      <div id="sutraList" class="sutra-list">
        <!-- sutra groups will be rendered here by initializeUI() or a small renderer -->
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    // When fragments are loaded, initializeUI will run on window.onload as before.
    // If initializeUI expects a #sutraDropdown, it will still find sutras.json and can render into #sutraList instead.

    // If the global initializeUI provided by script.js doesn't render to #sutraList,
    // we provide a small helper that will render sutras.json groups when available.
    function renderSutrasIfAvailable() {
      if (window.sutrasData) {
        renderSutras(window.sutrasData);
      } else {
        // load sutras.json directly as fallback
        fetch('sutras.json').then(r => r.json()).then(data => renderSutras(data)).catch(()=>{
          const el = document.getElementById('sutraList');
          el.innerHTML = '<p data-i18n="sutras_error">Could not load sutras.</p>';
        });
      }
    }

    function renderSutras(data) {
      const container = document.getElementById('sutraList');
      if (!container) return;
      container.innerHTML = '';

      const adhyayaNames = [
        "प्रथमोध्याय:", "द्वितीयोध्याय:", "तृतीयोध्यायः", "चतुर्थोध्यायः",
        "पञ्चमोध्यायः", "षष्ठोध्यायः", "सप्तमोध्यायः", "अष्टमोध्यायः"
      ];
      const padahNames = [
        "प्रथमः पादः", "द्वितीयः पादः", "तृतीयः पादः", "चतुर्थः पादः"
      ];

      let allSutras = [];
      if (data && data.samjnaSutras) allSutras = allSutras.concat(data.samjnaSutras);
      if (data && data.sutras) allSutras = allSutras.concat(data.sutras);

      const hierarchy = {};
      for(let i=1; i<=8; i++) {
        hierarchy[i] = { 1: [], 2: [], 3: [], 4: [] };
      }

      allSutras.forEach(s => {
        if(!s.id) return;
        const parts = s.id.split('.');
        if(parts.length === 3) {
          const a = parseInt(parts[0]);
          const p = parseInt(parts[1]);
          if(hierarchy[a] && hierarchy[a][p]) {
            hierarchy[a][p].push(s);
          }
        }
      });

  let firstPopulatedHtml = null;

      const pratyaharaSutras = [
        { name: "अइउण् (अ, इ, उ, ण्)", desc: "अइउण् इति प्रथमं माहेश्वरसूत्रम्। अत्र 'अ', 'इ', 'उ' इति त्रयः स्वराः सन्ति, 'ण्' इत्संज्ञकः अस्ति। अनेन 'अण्' प्रत्याहारः सिद्ध्यति। उदाहरणम्: अण्-प्रत्याहारे अ, इ, उ वर्णाः अन्तर्भवन्ति।" },
        { name: "ऋऌक् (ऋ, ऌ, क्)", desc: "ऋऌक् इति द्वितीयं सूत्रम्। अत्र 'ऋ', 'ऌ' इति द्वौ स्वरौ, 'क्' इत्संज्ञकः। अनेन 'अक्', 'इक्', 'उक्' इत्यादयः प्रत्याहाराः सिद्ध्यन्ति। उदाहरणम्: अक्-प्रत्याहारे अ, इ, उ, ऋ, ऌ अन्तर्भवन्ति।" },
        { name: "एओङ् (ए, ओ, ङ्)", desc: "एओङ् इति तृतीयं सूत्रम्। अत्र 'ए', 'ओ' इति संयुक्तस्वरौ, 'ङ्' इत्संज्ञकः। अनेन 'एङ्' प्रत्याहारः सिद्ध्यति। उदाहरणम्: एङ्-प्रत्याहारे ए, ओ अन्तर्भवतः।" },
        { name: "ऐऔच् (ऐ, औ, च्)", desc: "ऐऔच् इति चतुर्थं सूत्रम्। अत्र 'ऐ', 'औ' इति स्वरौ, 'च्' इत्संज्ञकः। अनेन 'अच्', 'इच्', 'एच्', 'ऐच्' प्रत्याहाराः सिद्ध्यन्ति। उदाहरणम्: अच्-प्रत्याहारे सर्वे स्वराः गृह्यन्ते।" },
        { name: "हयवरट् (ह, य, व, र, ट्)", desc: "हयवरट् इति पञ्चमं सूत्रम्। अत्र 'ह', 'य', 'व', 'र' इति व्यञ्जनानि, 'ट्' इत्संज्ञकः। अत्र 'ह' कारस्य उपदेशः विशेषार्थः।" },
        { name: "लण् (ल, ण्)", desc: "लण् इति षष्ठं सूत्रम्। अत्र 'ल' कारः, 'ण्' इत्संज्ञकः। 'हयवरट्' तथा 'लण्' इत्यनयोः मेलनेन 'यण्' प्रत्याहारः सिद्ध्यति। उदाहरणम्: यण्-प्रत्याहारे य, व, र, ल अन्तर्भवन्ति।" },
        { name: "ञमङणनम् (ञ, म, ङ, ण, न, म्)", desc: "ञमङणनम् इति सप्तमं सूत्रम्। अत्र वर्गाणां पञ्चमाक्षराणि (अनुनासिकाः) सन्ति, 'म्' इत्संज्ञकः। अनेन 'ञम्', 'अम्' इत्यादयः प्रत्याहाराः।" },
        { name: "झभञ् (झ, भ, ञ्)", desc: "झभञ् इति अष्टमं सूत्रम्। अत्र वर्गाणां चतुर्थाक्षरे 'झ', 'भ' स्तः, 'ञ्' इत्संज्ञकः। अनेन 'यञ्' प्रत्याहारः सिद्ध्यति।" },
        { name: "घढधष् (घ, ढ, ध, ष्)", desc: "घढधष् इति नवमं सूत्रम्। अत्र वर्गाणां चतुर्थाक्षराणि 'घ', 'ढ', 'ध' सन्ति, 'ष्' इत्संज्ञकः। अनेन 'झष्', 'भष्' प्रत्याहारौ।" },
        { name: "जबगडदश् (ज, ब, ग, ड, द, श्)", desc: "जबगडदश् इति दशमं सूत्रम्। अत्र वर्गाणां तृतीयाक्षराणि 'ज', 'ब', 'ग', 'ड', 'द' सन्ति, 'श्' इत्संज्ञकः। अनेन 'जश्' प्रत्याहारः सिद्ध्यति।" },
        { name: "खफछठथचटतव् (ख, फ, छ, ठ, थ, च, ट, त, व्)", desc: "खफछठथचटतव् इति एकादशं सूत्रम्। अत्र वर्गाणां द्वितीयाक्षराणि तथा प्रथमाक्षराणि सन्ति, 'व्' इत्संज्ञकः।" },
        { name: "कपय् (क, प, य्)", desc: "कपय् इति द्वादशं सूत्रम्। अत्र 'क', 'प' इति प्रथमाक्षरे, 'य्' इत्संज्ञकः। अनेन 'खय्', 'चय्', 'मय्' प्रत्याहाराः।" },
        { name: "शषसर् (श, ष, स, र्)", desc: "शषसर् इति त्रयोदशं सूत्रम्। अत्र 'श', 'ष', 'स' इति ऊष्मवर्णाः, 'र्' इत्संज्ञकः। अनेन 'झर्', 'खर्', 'शर्' प्रत्याहाराः।" },
        { name: "हल् (ह, ल्)", desc: "हल् इति चतुर्दशं सूत्रम्। अत्र 'ह' कारः, 'ल्' इत्संज्ञकः। अनेन 'हल्' प्रत्याहारेण सर्वाणि व्यञ्जनानि संगृहीतानि भवन्ति।" }
      ];

      const pratCard = document.createElement('div');
      pratCard.className = 'sutra-card';
      const pratHeader = document.createElement('div');
      pratHeader.className = 'sutra-card-header sanskrit-text';
      pratHeader.innerHTML = '<span style="background-color: #16a34a; color: white; padding: 4px 12px; border-radius: 6px; font-weight: bold; display: inline-block;">प्रत्याहार-सूत्राणि</span>';
      
      const pratDesc = document.createElement('div');
      pratDesc.className = 'sutra-card-desc';
      
      pratyaharaSutras.forEach(s => {
        const sutraItem = document.createElement('div');
        sutraItem.className = 'sutra-item sutra-card sub-card';
        const sHeader = document.createElement('div');
        sHeader.className = 'sutra-card-header sanskrit-text';
        sHeader.innerHTML = `<div style="display:flex; align-items:center; gap:8px;"><span class="sutra-name">${s.name}</span></div>`;
        const sDesc = document.createElement('div');
        sDesc.className = 'sutra-card-desc sanskrit-text';
        sDesc.textContent = s.desc;

        sutraItem.appendChild(sHeader);
        sutraItem.appendChild(sDesc);
        pratDesc.appendChild(sutraItem);
      });
      pratCard.appendChild(pratHeader);
      pratCard.appendChild(pratDesc);
      container.appendChild(pratCard);

      for(let a=1; a<=8; a++) {
        const adhyayaCard = document.createElement('div');
        adhyayaCard.className = 'sutra-card';
        const aHeader = document.createElement('div');
        aHeader.className = 'sutra-card-header sanskrit-text';
        aHeader.textContent = adhyayaNames[a-1];
        
        const aDesc = document.createElement('div');
        aDesc.className = 'sutra-card-desc';
        
        let hasSutras = false;
        for(let p=1; p<=4; p++) {
          const padahSutras = hierarchy[a][p];
          if(padahSutras.length === 0) continue;
          hasSutras = true;
          
          const padahCard = document.createElement('div');
          padahCard.className = 'sutra-card sub-card';
          const pHeader = document.createElement('div');
          pHeader.className = 'sutra-card-header sanskrit-text';
          pHeader.textContent = padahNames[p-1];
          
          const pDesc = document.createElement('div');
          pDesc.className = 'sutra-card-desc';
          
          padahSutras.forEach(s => {
            // Each sutra: header visible, description hidden until clicked
            const sutraItem = document.createElement('div');
            sutraItem.className = 'sutra-item sutra-card sub-card';
            const sHeader = document.createElement('div');
            sHeader.className = 'sutra-card-header sanskrit-text';
            const idSpan = s.id ? `<span class="sutra-id" style="margin-left:8px; font-size:0.9em; opacity:0.8;">${s.id}</span>` : '';
            sHeader.innerHTML = `<div style="display:flex; align-items:center; gap:8px;"><span class="sutra-name">${s.name}</span>${idSpan}</div>`;
            const sDesc = document.createElement('div');
            sDesc.className = 'sutra-card-desc sanskrit-text';
            sDesc.textContent = s.desc || '';

            sutraItem.appendChild(sHeader);
            sutraItem.appendChild(sDesc);
            pDesc.appendChild(sutraItem);
          });
          
          padahCard.appendChild(pHeader);
          padahCard.appendChild(pDesc);
          aDesc.appendChild(padahCard);
        }
        
        // attach a flag so we can later copy a populated list into empty adhyayas
        adhyayaCard.dataset.hasSutras = hasSutras ? '1' : '0';
        adhyayaCard.appendChild(aHeader);
        if (hasSutras) {
            // remember first populated adhyaya HTML to reuse for empty ones
            if (!firstPopulatedHtml) firstPopulatedHtml = aDesc.innerHTML;
        } else {
            // placeholder for empty adhyaya
            aDesc.innerHTML = '<p style="padding: 10px; color: #666;">कोई सूत्र उपलब्ध नहीं है</p>';
        }
        adhyayaCard.appendChild(aDesc);
        container.appendChild(adhyayaCard);
      }

      // If we found at least one populated adhyaya, copy its content into any empty adhyaya cards
      if (firstPopulatedHtml) {
        container.querySelectorAll('.sutra-card[data-has-sutras="0"]').forEach(card => {
          const desc = card.querySelector('.sutra-card-desc');
          if (desc) desc.innerHTML = firstPopulatedHtml;
          // mark as having sutras now
          card.dataset.hasSutras = '1';
        });
      }

      if (window.applyTranslationsExtended) window.applyTranslationsExtended();

      // wire up accordion behavior for the newly rendered cards (Adhyayas, Padahs, and Sutras)
      container.querySelectorAll('.sutra-card').forEach(card => {
        const hdr = card.querySelector('.sutra-card-header');
        if (!hdr) return;
        
        hdr.setAttribute('tabindex', '0');
        hdr.setAttribute('role', 'button');
        hdr.setAttribute('aria-expanded', 'false');
        
        hdr.addEventListener('click', (ev) => {
          ev.stopPropagation();
          
          // If this is a sutra-item, we might want to collapse other sutras in the same padah
          if (card.classList.contains('sutra-item')) {
            const siblings = card.parentElement.querySelectorAll('.sutra-item.active');
            siblings.forEach(sib => {
              if (sib !== card) {
                sib.classList.remove('active');
                sib.querySelector('.sutra-card-header')?.setAttribute('aria-expanded', 'false');
              }
            });
          }
          
          const active = card.classList.toggle('active');
          hdr.setAttribute('aria-expanded', active ? 'true' : 'false');
        });
        
        hdr.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter' || ev.key === ' ') { 
            ev.preventDefault(); 
            ev.stopPropagation(); 
            hdr.click(); 
          }
        });
      });
    }

    // run after window loads
    window.addEventListener('load', () => {
      setTimeout(renderSutrasIfAvailable, 200);
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="sutras_title">Sutras</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="animations.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div id="site-header"></div>

  <div id="floating-sanskrit-container"></div>

  <main class="container" style="position: relative; z-index: 10;">
    <section class="sutras-page">
  <h1 data-i18n="sutras_heading">Sutras</h1>
  <p data-i18n="sutras_intro">Select a sutra group to view the sutras. This page loads sutras from the site's data and is translated based on the header language buttons.</p>

      <div id="sutraList" class="sutra-list">
        <!-- sutra groups will be rendered here by initializeUI() or a small renderer -->
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    // When fragments are loaded, initializeUI will run on window.onload as before.
    // If initializeUI expects a #sutraDropdown, it will still find sutras.json and can render into #sutraList instead.

    // If the global initializeUI provided by script.js doesn't render to #sutraList,
    // we provide a small helper that will render sutras.json groups when available.
    function renderSutrasIfAvailable() {
      if (window.sutrasData) {
        renderSutras(window.sutrasData);
      } else {
        // load sutras.json directly as fallback
        fetch('sutras.json').then(r => r.json()).then(data => renderSutras(data)).catch(()=>{
          const el = document.getElementById('sutraList');
          el.innerHTML = '<p data-i18n="sutras_error">Could not load sutras.</p>';
        });
      }
    }

    function renderSutras(data) {
      const container = document.getElementById('sutraList');
      if (!container) return;
      container.innerHTML = '';

      // Render detailed samjnaSutras (1.1.x list) directly into container for 2-column grid
      if (data && Array.isArray(data.samjnaSutras) && data.samjnaSutras.length) {
        data.samjnaSutras.forEach(s => {
          const card = document.createElement('div'); card.className = 'sutra-card';
          const header = document.createElement('div'); header.className = 'sutra-card-header sanskrit-text'; 
          header.innerHTML = `<span class="sutra-id">${s.id || ''}</span> ${s.name || ''}`;
          const desc = document.createElement('div'); desc.className = 'sutra-card-desc sanskrit-text'; desc.textContent = s.desc || '';
          card.appendChild(header); card.appendChild(desc);
          container.appendChild(card);
        });
      }



      if (window.applyTranslationsExtended) window.applyTranslationsExtended();

      // wire up accordion behavior for the newly rendered cards
      container.querySelectorAll('.sutra-card').forEach(card => {
        const hdr = card.querySelector('.sutra-card-header');
        const desc = card.querySelector('.sutra-card-desc');
        if (!hdr) return;
        hdr.setAttribute('tabindex', '0');
        hdr.setAttribute('role', 'button');
        hdr.setAttribute('aria-expanded', 'false');
        hdr.addEventListener('click', () => {
          const active = card.classList.toggle('active');
          hdr.setAttribute('aria-expanded', active ? 'true' : 'false');
        });
        hdr.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); hdr.click(); }
        });
      });
    }

    // run after window loads; if loadDatabase sets window.sutrasData, we pick it up
    window.addEventListener('load', () => {
      // delay a tick to allow other onload handlers to populate sutras
      setTimeout(renderSutrasIfAvailable, 200);
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="sa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dhatus - Ganas</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script defer src="animations.js"></script>
  <script defer src="script.js"></script>
  <style>
    .sub-card { margin-top: 10px; margin-left: 15px; border-left: 3px solid #b45309; }
  .gana-btn { background:none;border:1px solid var(--border-light);padding:8px 12px;border-radius:8px;font-weight:700;cursor:pointer; }
  .gana-btn:hover { background: rgba(154,52,18,0.04); }
  .dhatu-table th, .dhatu-table td { vertical-align: middle; }
  </style>
</head>
  <body>
    <div id="site-header"></div>
    <div id="floating-sanskrit-container"></div>
    <main class="container full-width" style="position: relative; z-index: 10;">
    <section class="sutras-page">
      <div class="sutra-hero-row" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <button class="menu-mini-btn" aria-hidden="true" onclick="toggleMiniMenu(event)" style="background:none;border:none;font-size:20px;">☰</button>
        <h1 style="margin:0;">धातवः (Dhatus)</h1>
      </div>
      <p style="text-align: left;">धातुगणानुसारम्</p>
       <div id="dhatuList" class="sutra-list" style="text-align: left;">
      </div>

    </section>
  </main>
  <div id="site-footer"></div>
  <script>
    const ganas = [
      "भ्वादिगण (भू + आदि)",
      "अदादिगण (अद् + आदि)",
      "जुहोत्यादिगण (जुहोति + आदि)",
      "दिवादिगण (दिव् + आदि)",
      "स्वादिगण (सु + आदि)",
      "तुदादिगण (तुद् + आदि)",
      "रुधादिगण (रुध् + आदि)",
      "तनादिगण (तन् + आदि)",
      "क्र्यादिगण (क्री + आदि)",
      "चुरादिगण (चुर् + आदि)"
    ];

    async function renderGanas() {
      const container = document.getElementById('dhatuList');
      if (!container) return;
      container.innerHTML = '';
      
      let ganasData = {};
      try {
        const response = await fetch('ganas.json');
        ganasData = await response.json();
      } catch (err) {
        console.error('Failed to load ganas.json', err);
      }

      // create a card for each gana and render that gana's table inside the card desc
      ganas.forEach(ganaName => {
        const item = document.createElement('div');
        item.className = 'sutra-item sutra-card';

        const header = document.createElement('div');
        header.className = 'sutra-card-header sanskrit-text';
        header.setAttribute('tabindex', '0');
        header.setAttribute('role', 'button');
        header.setAttribute('aria-expanded', 'false');
        header.innerHTML = `<span>${ganaName}</span>`;

        const desc = document.createElement('div');
        desc.className = 'sutra-card-desc';

        // build table for this gana
        const ganaArr = Array.isArray(ganasData[ganaName]) ? ganasData[ganaName] : [];
        // always render the table headers so every gana shows the same layout
        let html = '<div style="overflow:auto;">';
        html += '<table class="dhatu-table" style="width:100%;border-collapse:collapse;margin-top:10px;min-width:800px;table-layout:fixed;">';
  html += '<thead><tr>' +
    '<th style="width:6%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">S.No</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">dhatuId</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">muladhatu</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">dhatu</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">meaning</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">gana</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">padi</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">it</th>' +
                '</tr></thead>';
        html += '<tbody>';
        if (ganaArr.length === 0) {
          html += `<tr><td colspan="8" style="padding:8px;color:#9ca3af;border-bottom:1px solid var(--border-light);">अस्मिन् गणे धातवः शीघ्रमेव योजयिष्यन्ते।</td></tr>`;
        } else {
          ganaArr.forEach((d, idx) => {
            const id = d.id ?? `${ganaName}-${idx+1}`;
            const dhatuId = d.dhatuId ?? d.id ?? `${ganaName}-${idx+1}`;
            const mul = d.form ?? d.muladhatu ?? '';
            const dh = d.dhatu ?? '';
            const meaning = d.meaning ?? '';
            const padi = d.padi ?? '';
            const it = d.it ?? '';
      html += `<tr>` +
        `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${idx+1}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${dhatuId}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${mul}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${dh}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;text-overflow:ellipsis;">${meaning}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);">${ganaName}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);">${padi}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);">${it}</td>` +
                    `</tr>`;
          });
        }
        html += '</tbody></table></div>';
        desc.innerHTML = html;

        // wire header toggles: expand only clicked item, collapse others
        header.addEventListener('click', (ev) => {
          ev.stopPropagation();
          container.querySelectorAll('.sutra-item.active').forEach(act => {
            if (act !== item) {
              act.classList.remove('active');
              act.querySelector('.sutra-card-header')?.setAttribute('aria-expanded','false');
            }
          });
          const becoming = item.classList.toggle('active');
          header.setAttribute('aria-expanded', becoming ? 'true' : 'false');
        });
        header.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); header.click(); } });

        item.appendChild(header);
        item.appendChild(desc);
        container.appendChild(item);
      });
    }

    window.addEventListener('load', renderGanas);
  </script>
</body>
</html>

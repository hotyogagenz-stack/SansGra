<!doctype html>
<html lang="sa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dhatus - Ganas</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script defer src="animations.js"></script>
  <script defer src="script.js"></script>
  <style>
    .sub-card { margin-top: 10px; margin-left: 15px; border-left: 3px solid #b45309; }
  .gana-btn { background:none;border:1px solid var(--border-light);padding:8px 12px;border-radius:8px;font-weight:700;cursor:pointer; }
  .gana-btn:hover { background: rgba(154,52,18,0.04); }
  .dhatu-table th, .dhatu-table td { vertical-align: middle; }
  </style>
</head>
  <body>
    <div id="site-header"></div>
    <div id="floating-sanskrit-container"></div>
    <main class="container full-width" style="position: relative; z-index: 10;">
    <section class="sutras-page">
      <div class="sutra-hero-row" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <button class="menu-mini-btn" aria-hidden="true" onclick="toggleMiniMenu(event)" style="background:none;border:none;font-size:20px;">☰</button>
        <h1 style="margin:0;">धातवः (Dhatus)</h1>
        <!-- right-aligned search box -->
        <div id="dhatuSearchWrapper" style="margin-left:auto;">
          <input id="dhatuSearch" type="search" placeholder="खोजें: धातु, मूलधातु, अर्थ, Hindi या English" aria-label="Search dhatus" style="width:320px;max-width:40vw;padding:8px 10px;border-radius:10px;border:2px solid #16a34a;background:#ecfdf5;color:#064e3b;box-shadow: inset 0 1px 0 rgba(0,0,0,0.02);"> 
        </div>
      </div>
      <p style="text-align: left;">धातुगणानुसारम्</p>
      <div id="dhatuList" class="sutra-list" style="text-align: left;">
      </div>

    </section>
  </main>
  <div id="site-footer"></div>
  <script>
    const ganas = [
      "भ्वादिगण (भू + आदि)",
      "अदादिगण (अद् + आदि)",
      "जुहोत्यादिगण (जुहोति + आदि)",
      "दिवादिगण (दिव् + आदि)",
      "स्वादिगण (सु + आदि)",
      "तुदादिगण (तुद् + आदि)",
      "रुधादिगण (रुध् + आदि)",
      "तनादिगण (तन् + आदि)",
      "क्र्यादिगण (क्री + आदि)",
      "चुरादिगण (चुर् + आदि)"
    ];

    async function renderGanas() {
      const container = document.getElementById('dhatuList');
      if (!container) return;
      container.innerHTML = '';
      
      let ganasData = {};
      try {
        const response = await fetch('ganas.json');
        ganasData = await response.json();
      } catch (err) {
        console.error('Failed to load ganas.json', err);
      }
      // helper: normalize Devanagari strings by removing combining marks and non-Devanagari chars
      function normalizeDev(str) {
        if (!str || typeof str !== 'string') return '';
        try {
          // remove Unicode combining marks (diacritics) and keep Devanagari letters
          return str.replace(/\p{M}/gu, '').replace(/[^\u0900-\u097F]/g, '').trim();
        } catch (e) {
          // fallback for engines without Unicode property escapes
          return str.replace(/[\u093C-\u094D\u0951-\u0954]/g, '').replace(/[^\u0900-\u097F]/g, '').trim();
        }
      }

      // helper to extract Hindi/English from dhatus.json label like: "भू (सत्तायाम् - होना | to exist, to become)"
      // Robust: handles missing '|' by looking for Latin text as English, falls back to parts around '-' or ';'.
      function parseLabelForTranslations(label) {
        if (!label || typeof label !== 'string') return { h: '', e: '' };
        // prefer content inside parentheses
        const paren = label.match(/\(([^)]+)\)/);
        const content = paren ? paren[1].trim() : label.trim();

        // If there's an explicit pipe separator, use it.
        if (content.includes('|')) {
          const parts = content.split('|').map(s => s.trim());
          const left = parts[0] ?? '';
          const right = parts.slice(1).join('|') ?? '';
          // Hindi: try text after '-' in left or last semicolon-separated token
          let h = '';
          if (left.includes('-')) {
            const lp = left.split('-').map(s => s.trim());
            h = lp[1] ?? lp[0] ?? '';
          } else if (left.includes(';')) {
            h = left.split(';').pop().trim();
          } else {
            h = left;
          }
          const e = right;
          return { h, e };
        }

        // No pipe — attempt to detect English (Latin letters) inside content
        const latinMatch = content.match(/[A-Za-z][A-Za-z ,\-]*/);
        if (latinMatch) {
          const e = latinMatch[0].trim();
          // Hindi is content before the latin part, cleaned of trailing separators
          const hRaw = content.slice(0, latinMatch.index).replace(/[-|;:]$/, '').trim();
          // If there's a '-' in the Hindi raw, prefer text after '-' as the Hindi gloss
          let h = hRaw;
          if (!h && content.includes('-')) {
            const parts = content.split('-').map(s => s.trim());
            h = parts[1] ?? parts[0] ?? '';
          } else if (h && h.includes(';')) {
            h = h.split(';').pop().trim();
          }
          return { h: h || '', e: e || '' };
        }

        // Final fallback: split on '-' or ';' heuristically
        if (content.includes('-')) {
          const parts = content.split('-').map(s => s.trim());
          return { h: parts[1] ?? parts[0] ?? '', e: '' };
        }
        if (content.includes(';')) {
          const parts = content.split(';').map(s => s.trim());
          return { h: parts.pop() || '', e: '' };
        }
        return { h: content, e: '' };
      }

      // load dhatus.json once for fallback lookups when gana entries miss `dhatu` or have malformed keys
      let dhatusDb = {};
      try {
        const dhResp = await fetch('dhatus.json');
        const dhData = await dhResp.json();
        dhatusDb = dhData.dhatus || {};
      } catch (err) {
        // non-fatal — we'll simply not be able to lookup from dhatus.json
        // console.warn('Failed to load dhatus.json for fallback lookup', err);
      }
  // create a card for each gana and render that gana's table inside the card desc
      ganas.forEach(ganaName => {
        const item = document.createElement('div');
        item.className = 'sutra-item sutra-card';

        const header = document.createElement('div');
        header.className = 'sutra-card-header sanskrit-text';
        header.setAttribute('tabindex', '0');
        header.setAttribute('role', 'button');
        header.setAttribute('aria-expanded', 'false');
        header.innerHTML = `<span>${ganaName}</span>`;

        const desc = document.createElement('div');
        desc.className = 'sutra-card-desc';

        // build table for this gana
        const ganaArr = Array.isArray(ganasData[ganaName]) ? ganasData[ganaName] : [];
  // always render the table headers so every gana shows the same layout
  let html = '<div style="overflow:auto;">';
  // remove hard min-width so table can shrink on small screens; container will scroll
  html += '<table class="dhatu-table" style="width:100%;border-collapse:collapse;margin-top:10px;table-layout:fixed;">';
  html += '<thead><tr>' +
    '<th style="width:6%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">S.No</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">dhatuId</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">muladhatu</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">dhatu</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">meaning</th>' +
                '<th style="width:10%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">Hindi</th>' +
                '<th style="width:10%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">English</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">gana</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">padi</th>' +
                '<th style="width:12.5%;text-align:left;border-bottom:1px solid var(--border-light);padding:8px;">it</th>' +
                '</tr></thead>';
        html += '<tbody>';
        if (ganaArr.length === 0) {
          html += `<tr><td colspan="10" style="padding:8px;color:#9ca3af;border-bottom:1px solid var(--border-light);">अस्मिन् गणे धातवः शीघ्रमेव योजयिष्यन्ते।</td></tr>`;
        } else {
          ganaArr.forEach((d, idx) => {
            const id = d.id ?? `${ganaName}-${idx+1}`;
            const dhatuId = d.dhatuId ?? d.id ?? `${ganaName}-${idx+1}`;
            const mul = d.form ?? d.muladhatu ?? '';
            const meaning = d.meaning ?? '';
            const padi = d.padi ?? '';
            const it = d.it ?? '';

            // (Hindi/English will be computed after dh is resolved)

            // compute dhatu value with multiple fallbacks:
            // 1. standard key d.dhatu
            // 2. any object key that contains the Devanagari character 'ध' (covers misspelled keys like 'धतु' etc)
            // 3. lookup in dhatus.json by dhatuId
            // 4. lookup in dhatus.json by mul (form) matching the .clean field
            let dh = '';
            if (d && typeof d === 'object') {
              if (d.dhatu) dh = d.dhatu;
              // look for keys that include the Devanagari character 'ध' (U+0927)
              if (!dh) {
                for (const k of Object.keys(d)) {
                  if (k.includes('\u0927')) {
                    // prefer string values
                    const val = d[k];
                    if (val && typeof val === 'string') { dh = val; break; }
                  }
                }
              }
            }
            // fallback: lookup in dhatus.json by dhatuId
            if (!dh && dhatuId && dhatusDb && typeof dhatusDb === 'object') {
              // dhatus.json uses Devanagari keys (clean forms) as keys; some dhatuIds might match clean forms
              if (dhatusDb[dhatuId]) {
                dh = dhatusDb[dhatuId].clean || dhatusDb[dhatuId].label || dhatuId;
              }
            }
            // fallback: lookup by mul/form value against dhatusDb entries' clean field
            if (!dh && mul && dhatusDb && typeof dhatusDb === 'object') {
              // exact match first
              if (dhatusDb[mul]) {
                dh = dhatusDb[mul].clean || dhatusDb[mul].label || mul;
              } else {
                const nMul = normalizeDev(mul);
                for (const key in dhatusDb) {
                  const entry = dhatusDb[key];
                  if (!entry) continue;
                  const nEntry = normalizeDev(entry.clean || entry.label || '');
                  if (!nEntry) continue;
                  if (nEntry === nMul || nEntry.startsWith(nMul) || nMul.startsWith(nEntry) || (nEntry.includes(nMul) || nMul.includes(nEntry))) {
                    dh = entry.clean || entry.label || key;
                    break;
                  }
                }
              }
            }
            // final fallback: use dhatuId string so cell is not empty
            if (!dh) dh = dhatuId;
            // Now compute Hindi and English using dh (or dhatuId/mul) to find a label in dhatusDb
            let hindi = d.hindi ?? '';
            let english = d.english ?? '';
            if ((!hindi || !english) && dhatusDb && typeof dhatusDb === 'object') {
              const candidates = [dh, dhatuId, mul, meaning];
              const nCandidates = candidates.map(c => normalizeDev(c || ''));
              let foundEntry = null;
              for (const key in dhatusDb) {
                const entry = dhatusDb[key];
                if (!entry) continue;
                // quick exact key match
                if (candidates.includes(key)) { foundEntry = entry; break; }
                const nKey = normalizeDev(key || '');
                if (nCandidates.includes(nKey)) { foundEntry = entry; break; }

                const entryClean = normalizeDev(entry.clean || '');
                const entryLabel = normalizeDev(entry.label || '');
                // match by cleaned variations
                for (const nc of nCandidates) {
                  if (!nc) continue;
                  if (entryClean === nc || entryClean.startsWith(nc) || nc.startsWith(entryClean)) { foundEntry = entry; break; }
                  if (entryLabel.includes(nc) || nc.includes(entryLabel)) { foundEntry = entry; break; }
                }
                if (foundEntry) break;

                // fallback: check if original label contains the mul or meaning (non-normalized)
                const rawLabel = (entry.label || '').toString();
                if (mul && rawLabel.includes(mul)) { foundEntry = entry; break; }
                if (meaning && rawLabel.includes(meaning)) { foundEntry = entry; break; }
                // small prefix match on dh (Devanagari)
                if (dh && (rawLabel.startsWith(dh) || (entry.clean && entry.clean.startsWith && entry.clean.startsWith(dh)))) { foundEntry = entry; break; }
              }
              if (foundEntry) {
                const parsed = parseLabelForTranslations(foundEntry.label || '');
                if (!hindi) hindi = parsed.h;
                if (!english) english = parsed.e;
              }
            }
      html += `<tr>` +
        `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${idx+1}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${dhatuId}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${mul}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${dh}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;text-overflow:ellipsis;">${meaning}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;text-overflow:ellipsis;">${hindi}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);overflow:hidden;text-overflow:ellipsis;">${english}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);">${ganaName}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);">${padi}</td>` +
                    `<td style="padding:8px;border-bottom:1px solid var(--border-light);">${it}</td>` +
                    `</tr>`;
          });
        }
        html += '</tbody></table></div>';
        desc.innerHTML = html;

        // wire header toggles: expand only clicked item, collapse others
        header.addEventListener('click', (ev) => {
          ev.stopPropagation();
          container.querySelectorAll('.sutra-item.active').forEach(act => {
            if (act !== item) {
              act.classList.remove('active');
              act.querySelector('.sutra-card-header')?.setAttribute('aria-expanded','false');
            }
          });
          const becoming = item.classList.toggle('active');
          header.setAttribute('aria-expanded', becoming ? 'true' : 'false');
        });
        header.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); header.click(); } });

        item.appendChild(header);
        item.appendChild(desc);
        container.appendChild(item);
      });
      setupDhatuSearch();
    }

    window.addEventListener('load', renderGanas);

    function setupDhatuSearch() {
      const input = document.getElementById('dhatuSearch');
      const container = document.getElementById('dhatuList');
      if (!input || !container) return;

      // normalizer for search (handles Devanagari combining marks when supported)
      function normalizeForSearch(str) {
        if (!str) return '';
        try {
          return str.toString().replace(/\p{M}/gu, '').toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, ' ').replace(/\s+/g,' ').trim();
        } catch (e) {
          return str.toString().replace(/[\u093C-\u094D\u0951-\u0954]/g, '').toLowerCase().replace(/[^\w\s\u0900-\u097F]/g, ' ').replace(/\s+/g,' ').trim();
        }
      }

      // build searchable index on all rows grouped by card
      const cards = Array.from(container.querySelectorAll('.sutra-item'));
      cards.forEach(card => {
        const rows = Array.from(card.querySelectorAll('.dhatu-table tbody tr'));
        rows.forEach(row => {
          const cells = Array.from(row.querySelectorAll('td'));
          if (cells.length > 1) {
            // Index cells 1 to 6: dhatuId, muladhatu, dhatu, meaning, Hindi, English
            const texts = cells.slice(1, 7).map(td => td.textContent || td.innerText || '').join(' | ');
            row.dataset.search = normalizeForSearch(texts);
          }
        });
      });

      input.addEventListener('input', (ev) => {
        const q = normalizeForSearch(ev.target.value || '');
        
        cards.forEach(card => {
          const rows = Array.from(card.querySelectorAll('.dhatu-table tbody tr'));
          const header = card.querySelector('.sutra-card-header');
          
          if (!q) {
            card.style.display = '';
            card.classList.remove('active');
            if (header) header.setAttribute('aria-expanded', 'false');
            rows.forEach(r => {
              r.style.display = '';
              r.classList.remove('match');
            });
            return;
          }

          let matchCount = 0;
          rows.forEach(r => {
            const hay = r.dataset.search || '';
            if (hay.includes(q)) {
              r.style.display = '';
              r.classList.add('match');
              matchCount++;
            } else {
              r.style.display = 'none';
              r.classList.remove('match');
            }
          });

          if (matchCount > 0) {
            card.style.display = '';
            card.classList.add('active');
            if (header) header.setAttribute('aria-expanded', 'true');
          } else {
            card.style.display = 'none';
            card.classList.remove('active');
            if (header) header.setAttribute('aria-expanded', 'false');
          }
        });
      });
    }
  </script>
</body>
</html>
